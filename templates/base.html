<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Happy Hoppy{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark navbar-expand-lg hh-navbar">
  <div class="container-fluid px-3">

    <a class="navbar-brand fw-bold me-4" href="{{ url_for('index') }}">
      <i class="fa-solid fa-envelope-open-text me-2"></i>Happy Hoppy
    </a>

    <form class="d-flex flex-grow-1 me-3 search-bar-form" action="{{ url_for('search') }}" method="get" id="global-search-form">
      <input type="hidden" name="type" id="global-search-type" value="{{ request.args.get('type','emails') }}">
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0">
          <i class="fa-solid fa-magnifying-glass text-muted"></i>
        </span>
        <input type="text" name="q" id="global-search-input" class="form-control border-start-0 ps-0"
               placeholder="Search emails, contacts, calendar…"
               value="{{ request.args.get('q', '') }}" autocomplete="off">
        <button class="btn btn-primary px-4" type="submit">Search</button>
      </div>
    </form>

    <div class="navbar-nav flex-row gap-2">
      <a href="{{ url_for('search', type='emails') }}" class="nav-link text-white px-2
         {% if request.endpoint == 'search' and request.args.get('type','emails') == 'emails' %}active-nav{% endif %}">
        <i class="fa-solid fa-envelope me-1"></i>Emails
      </a>
      <a href="{{ url_for('contacts') }}" class="nav-link text-white px-2
         {% if request.endpoint in ('contacts','view_contact') %}active-nav{% endif %}">
        <i class="fa-solid fa-address-book me-1"></i>Contacts
      </a>
      <a href="{{ url_for('calendar') }}" class="nav-link text-white px-2
         {% if request.endpoint == 'calendar' %}active-nav{% endif %}">
        <i class="fa-regular fa-calendar me-1"></i>Calendar
      </a>
    </div>

  </div>
</nav>

<div class="container-fluid px-4 py-3">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
